<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CBT SDN NGASEM I - PENDIDIKAN PANCASILA</title>
    <style>
        :root {
            --primary: #2563eb; --primary-dark: #1e40af;
            --bg: #f1f5f9; --text: #1e293b; --white: #ffffff;
            --danger: #ef4444; --success: #10b981; --border: #e2e8f0;
        }
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); margin: 0; user-select: none; color: var(--text); overflow-x: hidden; }

        /* Anti-Cheat Overlay - Diperbaiki agar tidak menghalangi jika sembunyi */
        #cheat-overlay { 
            display: none; position: fixed; inset: 0; 
            background: rgba(15, 23, 42, 0.98); color: white; 
            z-index: 9999; justify-content: center; align-items: center; 
            text-align: center; padding: 20px; backdrop-filter: blur(10px); 
        }

        /* Login */
        #login-page { position: fixed; inset: 0; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); display: flex; justify-content: center; align-items: center; z-index: 1000; padding: 15px; }
        .login-card { background: white; padding: 25px; border-radius: 20px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.2); }

        /* Header */
        header { background: var(--white); border-bottom: 2px solid var(--border); padding: 0 15px; display: none; justify-content: space-between; align-items: center; height: 65px; position: sticky; top: 0; z-index: 100; }
        .timer-box { background: #fff1f2; padding: 8px 12px; border-radius: 8px; font-weight: 800; color: var(--danger); font-family: monospace; border: 1px solid #ffe4e6; }

        /* Layout */
        .main-wrapper { display: none; padding: 15px; gap: 15px; max-width: 1200px; margin: 0 auto; }
        .soal-section { flex: 3; background: white; border-radius: 15px; border: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
        .soal-content { padding: 20px; font-size: 1.1rem; line-height: 1.6; }

        /* Opsi Jawaban - Dibuat lebih besar & responsif klik */
        .opt-item { 
            border: 1px solid var(--border); padding: 15px; margin-bottom: 12px; 
            border-radius: 12px; cursor: pointer; display: flex; align-items: center; 
            gap: 12px; position: relative; z-index: 50; background: var(--white);
        }
        .opt-item:active { background: #f8fafc; }
        .opt-item.selected { border: 2px solid var(--primary); background: #eff6ff; font-weight: 600; }
        .opt-label { min-width: 35px; height: 35px; border-radius: 50%; border: 2px solid #cbd5e1; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .selected .opt-label { background: var(--primary); color: white; border-color: var(--primary); }

        /* Sidebar */
        .sidebar { flex: 1; background: white; border-radius: 15px; padding: 15px; border: 1px solid var(--border); height: fit-content; position: sticky; top: 80px; }
        .grid-nomor { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-top: 10px; }
        .btn-nomor { aspect-ratio: 1/1; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; cursor: pointer; border-radius: 8px; font-weight: 700; background: white; font-size: 0.9rem; }
        .btn-nomor.active { border: 2px solid var(--primary); color: var(--primary); }
        .btn-nomor.filled { background: var(--primary); color: white; border-color: var(--primary); }

        .img-soal { display: block; max-width: 100%; height: auto; max-height: 200px; margin: 10px auto; border-radius: 8px; }

        /* Responsive HP */
        @media (max-width: 768px) {
            .main-wrapper { flex-direction: column; }
            .sidebar { order: 2; max-width: 100%; position: static; }
            .soal-section { order: 1; }
            .grid-nomor { grid-template-columns: repeat(8, 1fr); }
            .soal-content { padding: 15px; font-size: 1rem; }
        }

        #result-page { display: none; max-width: 500px; margin: 50px auto; background: white; padding: 30px; border-radius: 20px; text-align: center; }
    </style>
</head>
<body oncontextmenu="return false;">

<div id="cheat-overlay">
    <div>
        <h1 style="font-size:3rem; margin:0;">⚠️</h1>
        <h2>JANGAN PINDAH TAB!</h2>
        <p>Kembali fokus ke pengerjaan soal.</p>
        <button onclick="closeOverlay()" style="padding:12px 25px; background:var(--primary); color:white; border:none; border-radius:8px; cursor:pointer; font-weight:bold;">KEMBALI KE UJIAN</button>
    </div>
</div>

<div id="login-page">
    <div class="login-card">
        <h2 style="color:var(--primary); margin:0;">ASAT 2026</h2>
        <p style="font-weight:bold; color:#64748b; margin-bottom:20px;">SD NEGERI NGASEM I</p>
        <input type="text" id="stu-name" placeholder="Nama Lengkap" style="width:100%; padding:12px; margin-bottom:12px; border-radius:8px; border:2px solid var(--border); outline:none;">
        <input type="text" id="stu-id" placeholder="Nomor Peserta" style="width:100%; padding:12px; margin-bottom:20px; border-radius:8px; border:2px solid var(--border); outline:none;">
        <button onclick="startExam()" style="width:100%; padding:15px; background:var(--primary); color:white; border:none; border-radius:8px; font-weight:bold; cursor:pointer;">MASUK UJIAN</button>
    </div>
</div>

<header id="exam-header">
    <div style="font-weight:800; color:var(--primary);" id="user-display">PESERTA</div>
    <div class="timer-box" id="timer">90:00</div>
</header>

<div class="main-wrapper" id="exam-body">
    <div class="soal-section">
        <div style="padding:10px 20px; background:#f8fafc; border-bottom:1px solid var(--border); font-weight:bold; font-size:0.8rem;" id="header-no">SOAL NO 1</div>
        <div class="soal-content" id="content-area"></div>
        <div style="padding:15px; display:flex; gap:10px; background:#f8fafc; border-top:1px solid var(--border);">
            <button onclick="nav(-1)" style="flex:1; padding:12px; border-radius:8px; border:none; font-weight:bold; cursor:pointer; background:#e2e8f0;">KEMBALI</button>
            <button id="btn-next" onclick="nav(1)" style="flex:2; padding:12px; background:var(--primary); color:white; border-radius:8px; border:none; font-weight:bold; cursor:pointer;">LANJUT</button>
            <button id="btn-finish" onclick="confirmFinish()" style="display:none; flex:2; padding:12px; background:var(--danger); color:white; border-radius:8px; border:none; font-weight:bold; cursor:pointer;">KIRIM</button>
        </div>
    </div>
    <div class="sidebar">
        <div style="font-weight:bold; font-size:0.8rem; color:#64748b;">NAVIGASI</div>
        <div class="grid-nomor" id="nav-grid"></div>
    </div>
</div>

<div id="result-page">
    <h2 style="color:var(--primary);">SELESAI</h2>
    <div id="final-score" style="font-size:4rem; font-weight:900; color:var(--success);">0</div>
    <p>Jawaban berhasil dikirim!</p>
    <button onclick="location.reload()" style="padding:12px 30px; background:var(--primary); color:white; border:none; border-radius:8px; cursor:pointer; font-weight:bold;">KELUAR</button>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz0UlQLzZlMdgqJYH5fiXJ2EmKJY_6Stf061llEqUitrVAkVKlFdBSQhSNinBoAkYmLTg/exec";
    
    // Bank Soal 1-50 (Gunakan bankSoal Anda yang sebelumnya di sini)
    const bankSoal = [
        { id: 1, type: 'pg', q: "Kita harus memelihara dan membina kerukunan hidup antarumat beragama dengan cara ...", o: ["menghormati hak dan kewajiban umat beragama", "mengotori tempat ibadah umat agama lain", "menjelek jelekan pemeluk agama lain", "menyebarkan kebencian pada agama tertentu"], a: "A" },
        { id: 2, type: 'pg', q: "Ketika berangkat ke sekolah, kamu melihat temanmu yang berasal dari suku dan agama yang berbeda terjatuh dari sepeda. Sikap yang sebaiknya kamu lakukan adalah ...", o: ["berpura-pura tidak melihatnya", "tidak menolongnya karena berbeda suku", "menolongnya walaupun berbeda suku", "meninggalkannya takut terlambat"], a: "C" },
        { id: 3, type: 'pg', q: "Manfaat bersikap tidak membeda-bedakan ras dalam berteman adalah untuk ....", o: ["Menjadikan perselisihan", "Mempererat tali persaudaraan", "Saling mengejek dengan teman", "Menjadikan pertengkaran"], a: "B" },
        { id: 4, type: 'pg', q: "Dari gambar tersebut merupakan penerapan nilai pancasila .....", o: ["Ke 1", "Ke 2", "Ke 4", "Ke 5"], a: "B", img: "https://media.quizizz.com/_mdserver/main/media/resource/gs/quizizz-media/quizzes/599c52ab-aebd-4d25-abce-d58b36ced111-v2?w=200&h=200" },
        { id: 5, type: 'pg', q: "Contoh sikap toleransi dalam keberagaman agama dapat diwujudkan dengan cara ...", o: ["menghormati agama yang diyakini oleh orang lain", "memaksakan keyakinan agama kita kepada orang lain", "mengganggu peribadatan umat agama lain", "menganggu peribadatan umat agama lain"], a: "A" },
        { id: 6, type: 'pg', q: "Berikut ini intoleransi beragama yang masih sering terjadi dilingkungan sekolah, yaitu ....", o: ["berkelompok dengan teman yang agamanya minoritas", "merundung teman sekelas yang agamanya berbeda", "memutar musik kencang ketika tetangga beribadah", "melaksanakan piket sesuai jadwal"], a: "B" },
        { id: 7, type: 'pg', q: "Sikap bangga terhadap keberagaman bangsa Indonesia dapat ditunjukkan dengan cara ...", o: ["membuang sampah sembarangan", "menjelekkan produk dalam negeri", "menciptakan kerukanan di masyarakat", "merusak fasilitas umum sesuai keinginan kita"], a: "C" },
        { id: 8, type: 'pg', q: "Contoh toleransi dalam keberagaman budaya dan agama di lingkungan masyarakat ...", o: ["tidak memberi kesempatan umat agama lain untuk beribadah", "mengumpulkan dana sosial membantu warga yang tidak mampu", "mengganggu perayaan hari raya keagamaan", "merendahkan adat istiadat daerah lain"], a: "B" },
        { id: 9, type: 'pg', q: "Siswa kelas VI SD Merdeka berjumlah 25 anak. Ada 20 anak beragama Islam, 3 anak beragama Kristen, dan 2 orang anak beragama Konghuchu. Siswa yang berhak menjadi ketua kelas VI adalah ....", o: ["siswa yang beragama Islam", "siswa yang beragama Konghuchu", "siswa yang beragama Kristen", "seluruh siswa kelas VI"], a: "D" },
        { id: 10, type: 'pg', q: "Contoh sikap intoleransi yang terjadi di masyarakat diantaranya...", o: ["membeda-bedakan orang berdasarkan suku/ras", "memberi bantuan bagi orang yang membutuhkan", "memberi kebebasan tradisi", "menghormati hak orang lain"], a: "A" },
        { id: 11, type: 'pg', q: "Cara untuk mewujudkan toleransi dalam keragaman suku bangsa adalah ...", o: ["melestarikan budaya daerah", "melakukan gotong royong", "menjaga kerukunan beragama", "menghormati antar suku"], a: "D" },
        { id: 12, type: 'pg', q: "Rasa bangga terhadap bangsa Indonesia dapat diwujudkan di sekolah dengan cara ...", o: ["menjadi juara lomba di kelas", "memakai seragam yang mahal", "membuat gaduh di kelas", "menyontek ulangan sekolah"], a: "A" },
        { id: 13, type: 'pg', q: "Salah satu contoh kewajiban siswa terhadap negara adalah ....", o: ["berpakaian rapi", "belajar dengan rajin dan tekun", "menjalankan piket", "mengikuti pemilihan umum"], a: "B" },
        { id: 14, type: 'pg', q: "Sila Pancasila yang menekankan tentang kerukunan agar NKRI terjaga adalah ....", o: ["sila kedua", "sila keempat", "sila ketiga", "sila kelima"], a: "C" },
        { id: 15, type: 'pg', q: "Bangsa Indonesia tetap dapat berkomunikasi menggunakan bahasa pemersatu yaitu ....", o: ["Jawa", "Indonesia", "Inggris", "Internasional"], a: "B" },
        { id: 16, type: 'pg', q: "Gambar di atas merupakan ciri khas daerah otonomi khusus, yaitu ....", o: ["DKI Jakarta", "Daerah Istimewa Aceh", "Provinsi Papua", "Daerah Istimewa Yogyakarta"], a: "B", img: "https://media.quizizz.com/_mdserver/main/media/resource/gs/quizizz-media/quizzes/defff317-8b1d-4268-b9cf-d160ff159fb8-v2?w=200&h=200" },
        { id: 17, type: 'pg', q: "Provinsi di Indonesia dipimpin oleh kepala daerah yaitu gubernur dan wakil gubernur. Pasangan gubernur dan wakil gubernur tersebut di pilih secara langsung setiap ... tahun sekali", o: ["1", "3", "4", "5"], a: "D" },
        { id: 18, type: 'pg', q: "Sikap yang mencerminkan penghargaan terhadap provinsi lain adalah ....", o: ["menolak budaya lain", "mengabaikan tradisi lain", "menghargai keunikan budaya lain", "menganggap budaya sendiri paling baik"], a: "C" },
        { id: 19, type: 'pg', q: "Kebanggaan terhadap provinsi tempat tinggal dapat diwujudkan dengan cara ....", o: ["melestarikan tradisi adat istiadat", "mengabaikan budaya daerah", "mengkritik kebudayaan lokal", "menghapus tradisi lama"], a: "A" },
        { id: 20, type: 'pg', q: "Serambi Mekah adalah julukan dari propinsi....", o: ["Sumatera Utara", "Sulawesi Utara", "Aceh", "Kalimantan Barat"], a: "C" },
        { id: 21, type: 'pg', q: "Tari yang semula dibawakan pada upacara ritual pertanian yang bertujuan untuk kesuburan padi dan perolehan panen melimpah. Para penari menjadi representasi dewi padi atau Dewi Sri. Tari yang dimaksud adalah ....", o: ["Tari Gambyong, Jawa Tengah", "Tari Kecak, Bali", "Tari Campak, Bangka Belitung", "Tari Piring, Sumatera Barat"], a: "A" },
        { id: 22, type: 'pg', q: "Ciri khas suku Batak adalah ....", o: ["baju bodo", "tinggal di Sumatra Utara", "rumah gadang", "intonasi bicaranya lembut"], a: "B" },
        { id: 23, type: 'pg', q: "Salah satu ciri khas yang dimiliki Daerah Istimewa Yogyakarta, diantaranya...", o: ["kerajinan emasnya", "kopi khas", "kerajinan peraknya", "penggunaan sarung"], a: "C" },
        { id: 24, type: 'pg', q: "Beberapa provinsi memiliki status sebagai daerah otonomi khusus. Salah satu kekhususan tersebut adalah gubernur tidak langsung di pilih secara langsung oleh rakyat. Provinsi yang memiliki keistimewaan tersebut adalah ....", o: ["DKI Jakarta", "Aceh", "Papua", "Daerah Istimewa Yogyakarta"], a: "D" },
        { id: 25, type: 'pg', q: "Gotong royong merupakan salah satu wujud penerapan sila ...", o: ["Sila 1", "Sila 5", "Sila 3", "Sila 2"], a: "C" },
        { id: 26, type: 'pg', q: "Dalam melaksanakan gotong royong, diperlukan sikap ....", o: ["egois", "acuh tak acuh", "malas", "toleransi dan kerjasama"], a: "D" },
        { id: 27, type: 'pg', q: "Membersihkan selokan dapat mencegah ...", o: ["puting beliung", "tanah longsor", "banjir dan penyakit", "gempa bumi"], a: "C" },
        { id: 28, type: 'pg', q: "Berikut ini adalah contoh gotong royong yang ada di lingkungan sekolah ....", o: ["merundung teman", "menyontek", "bersama-sama membersihkan halaman", "mengotori kelas"], a: "C" },
        { id: 29, type: 'pg', q: "Gotong royong merupakan salah satu ciri bangsa Indonesia. Gotong royong harus terus dilestarikan. Hal tersebut dikarenakan nilai-nilai yang terdapat di dalamnya. Nilai yang terkandung dalam kegiatan tersebut adalah ......", o: ["suka menolong", "masa bodoh", "menang sendiri", "individual"], a: "A" },
        { id: 30, type: 'pg', q: "Bentuk kegiatan gotong-royong di rumah adalah...", o: ["nonton TV", "makan malam", "rekreasi", "bersama membersihkan rumah"], a: "D" },
        { id: 31, type: 'pg', q: "Adi menangis karena tidak mengerjakan PR, sikap yang seharusnya dilakukan oleh Toni sebagai temannya adalah....", o: ["beri sontekan", "bujuk supaya berhenti menangis", "masa bodoh", "tinggalkan bermain"], a: "B" },
        { id: 32, type: 'pg', q: "Manfaat kegiatan gotong royong adalah ...", o: ["selesai lebih lama", "pekerjaan lebih ringan", "pekerjaan lebih berat", "dapat uang"], a: "B" },
        { id: 33, type: 'pg', q: "Gotong royong membantu bela negara dengan cara ...", o: ["memecah persatuan", "masa bodoh", "egois", "memperkuat persaudaraan"], a: "D" },
        { id: 34, type: 'pg', q: "Sikap yang harus dihindari dalam gotong royong adalah .....", o: ["Egois", "Toleransi", "Kerjasama", "Solidaritas"], a: "A" },
        { id: 35, type: 'pg', q: "Manfaat gotong-royong di masyarakat adalah ...", o: ["membuat konflik antar warga masyarakat", "meningkatkan lingkungan yang kumuh", "mengurangi interaksi sosial di lingkungan", "membuat pekerjaan cepat selesai"], a: "D" },
        { id: 36, type: 'isian', q: "Akibat jika tidak ada sikap toleransi di lingkungan kita adalah ....", a: "Perpecahan" },
        { id: 37, type: 'isian', q: "Negara menjamin kemerdekaan tiap-tiap penduduk untuk memeluk agamanya masing-masing. Bunyi UUD 1945 pasal 29 ayat ...", a: "2" },
        { id: 38, type: 'isian', q: "Apa nama alat musik tradisional dari gambar tersebut?", a: "Sasando", img: "https://media.quizizz.com/_mdserver/main/media/resource/gs/quizizz-media/quizzes/0c58d069-29a3-4144-bfd0-b18501d1d981-v2?w=200&h=200" },
        { id: 39, type: 'isian', q: "Rumah adat tersebut berasal dari provinsi?", a: "Sumatera Barat", img: "https://media.quizizz.com/_mdserver/main/media/resource/gs/quizizz-media/quizzes/c2ea845e-e1fe-47e4-aa43-30af1cc3b297-v2?w=200&h=200" },
        { id: 40, type: 'isian', q: "Provinsi yang memilih gubernur berdasarkan garis keturunan Sultan adalah ....", a: "Yogyakarta" },
        { id: 41, type: 'isian', q: "Jumlah provinsi di Indonesia saat ini adalah ....", a: "38" },
        { id: 42, type: 'isian', q: "Nama gubernur Jawa Timur saat ini adalah ....", a: "Khofifah" },
        { id: 43, type: 'isian', q: "Gotong Royong merupakan istilah dari bahasa Jawa, yaitu Gotong dan Royong. Gotong berarti ....", a: "Pikul" },
        { id: 44, type: 'isian', q: "Berasal dari mana Tradisi Bakar Batu tersebut .... ", a: "Papua" },
        { id: 45, type: 'isian', q: "Suku Betawi mendiami wilayah provinsi ....", a: "DKI Jakarta" },
        { id: 46, type: 'uraian', q: "Tuliskan 3 contoh sikap menghormati keberagaman dalam lingkungan keluarga!" },
        { id: 47, type: 'uraian', q: "Tuliskan 2 contoh toleransi keberagaman budaya dan agama di lingkungan masyarakat!" },
        { id: 48, type: 'uraian', q: "Tuliskan ciri khas provinsi tempat kalian tinggal (Jawa Timur)!" },
        { id: 49, type: 'uraian', q: "Sebutkan 8 provinsi awal pada masa kemerdekaan Indonesia!" },
        { id: 50, type: 'uraian', q: "Tuliskan alasan pentingnya sikap gotong royong di lingkungan masyarakat!" }
    ];

    let current = 0;
    let answers = JSON.parse(localStorage.getItem('cbt_ans')) || {};

    function startExam() {
        const n = document.getElementById('stu-name').value.trim();
        const i = document.getElementById('stu-id').value.trim();
        if(!n || !i) return alert("Lengkapi data!");
        document.getElementById('user-display').innerText = n.toUpperCase();
        document.getElementById('login-page').style.display = 'none';
        document.getElementById('exam-header').style.display = 'flex';
        document.getElementById('exam-body').style.display = 'flex';
        initNav(); render(0); startTimer(90);
    }

    function render(idx) {
        current = idx;
        const s = bankSoal[idx];
        document.getElementById('header-no').innerText = `SOAL NO ${idx + 1}`;
        const area = document.getElementById('content-area');
        
        let html = s.img ? `<img src="${s.img}" class="img-soal">` : "";
        html += `<p style="margin-bottom:20px;">${s.q}</p>`;

        if(s.type === 'pg') {
            s.o.forEach((opt, i) => {
                const char = String.fromCharCode(65 + i);
                html += `<div class="opt-item ${answers[idx] === char ? 'selected' : ''}" onclick="saveAnswer('${char}')">
                    <div class="opt-label">${char}</div><div style="flex:1">${opt}</div></div>`;
            });
        } else {
            html += `<textarea id="ans-box" oninput="saveAnswer(this.value)" style="width:100%; height:120px; padding:12px; border-radius:10px; border:1px solid #ddd; outline:none; font-size:1rem;">${answers[idx] || ''}</textarea>`;
        }
        area.innerHTML = html;
        
        document.getElementById('btn-next').style.display = (current === bankSoal.length - 1) ? 'none' : 'block';
        document.getElementById('btn-finish').style.display = (current === bankSoal.length - 1) ? 'block' : 'none';
        updateNavUI();
        window.scrollTo(0,0);
    }

    function saveAnswer(v) {
        answers[current] = v;
        localStorage.setItem('cbt_ans', JSON.stringify(answers));
        updateNavUI();
        // Hanya render ulang jika PG untuk update visual 'selected'
        if(bankSoal[current].type === 'pg') render(current);
    }

    function nav(d) { let n = current + d; if(n >= 0 && n < bankSoal.length) render(n); }

    function initNav() {
        const g = document.getElementById('nav-grid');
        g.innerHTML = "";
        bankSoal.forEach((_, i) => {
            const d = document.createElement('div'); d.className = 'btn-nomor'; d.id = `n-${i}`;
            d.innerText = i + 1; d.onclick = () => render(i); g.appendChild(d);
        });
    }

    function updateNavUI() {
        bankSoal.forEach((_, i) => {
            const el = document.getElementById(`n-${i}`);
            if(el) el.className = 'btn-nomor' + (i === current ? ' active' : '') + (answers[i] ? ' filled' : '');
        });
    }

    function startTimer(m) {
        let t = m * 60;
        setInterval(() => {
            let mn = Math.floor(t/60); let s = t%60;
            document.getElementById('timer').innerText = `${mn}:${s<10?'0':''}${s}`;
            if(t > 0) t--;
        }, 1000);
    }

    function confirmFinish() {
        if(!confirm("Kirim jawaban sekarang?")) return;
        let correct = 0;
        bankSoal.forEach((s, i) => {
            if(s.type === 'pg' && answers[i] === s.a) correct++;
            if(s.type === 'isian' && answers[i]?.toLowerCase().trim().includes(s.a.toLowerCase())) correct++;
        });
        const score = Math.round((correct / 45) * 100);

        fetch(SCRIPT_URL, {
            method: "POST", mode: "no-cors",
            body: JSON.stringify({
                nama: document.getElementById('stu-name').value,
                nomor: document.getElementById('stu-id').value,
                skor: score, jawaban: JSON.stringify(answers)
            })
        });

        document.getElementById('exam-body').style.display = 'none';
        document.getElementById('exam-header').style.display = 'none';
        document.getElementById('result-page').style.display = 'block';
        document.getElementById('final-score').innerText = score;
        localStorage.clear();
    }

    function closeOverlay() { document.getElementById('cheat-overlay').style.display = 'none'; }
    document.addEventListener("visibilitychange", () => {
        if(document.hidden && document.getElementById('exam-body').style.display === 'flex') {
            document.getElementById('cheat-overlay').style.display = 'flex';
        }
    });
</script>
</body>
</html>
